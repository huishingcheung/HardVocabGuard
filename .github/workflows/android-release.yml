name: Android Release

on:
  push:
    tags:
      - "v*"

jobs:
  release:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Gradle Cache
        uses: gradle/actions/setup-gradle@v4

      - name: Prepare Signing (Optional)
        run: |
          KEYSTORE_B64="${{ secrets.SIGNING_KEYSTORE_BASE64 }}"
          SIGNING_PASSWORD="${{ secrets.SIGNING_PASSWORD }}"

          STORE_PW="${{ secrets.SIGNING_STORE_PASSWORD }}"
          KEY_PW="${{ secrets.SIGNING_KEY_PASSWORD }}"
          KEY_ALIAS="${{ secrets.SIGNING_KEY_ALIAS }}"

          if [ -n "$KEYSTORE_B64" ] && [ -n "$SIGNING_PASSWORD" ]; then
            mkdir -p keystore
            echo "$KEYSTORE_B64" | base64 -d > keystore/release.jks
            cat > keystore.properties <<EOF
          storeFile=keystore/release.jks
          storePassword=$SIGNING_PASSWORD
          keyAlias=hardvocabguard
          keyPassword=$SIGNING_PASSWORD
          EOF
          elif [ -n "$KEYSTORE_B64" ] && [ -n "$STORE_PW" ] && [ -n "$KEY_ALIAS" ] && [ -n "$KEY_PW" ]; then
            mkdir -p keystore
            echo "$KEYSTORE_B64" | base64 -d > keystore/release.jks
            cat > keystore.properties <<EOF
          storeFile=keystore/release.jks
          storePassword=$STORE_PW
          keyAlias=$KEY_ALIAS
          keyPassword=$KEY_PW
          EOF
          else
            echo "Signing secrets missing, build will use unsigned release config."
          fi

      - name: Assemble Release
        run: ./gradlew :app:assembleRelease -x lint

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            app/build/outputs/apk/release/*.apk

