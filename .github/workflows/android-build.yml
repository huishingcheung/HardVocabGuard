name: Android Build

on:
  push:
    branches: [ "main" ]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Gradle Cache
        uses: gradle/actions/setup-gradle@v4

      - name: Prepare Signing (Optional)
        run: |
          if [ -n "${{ secrets.SIGNING_KEYSTORE_BASE64 }}" ] && [ -n "${{ secrets.SIGNING_PASSWORD }}" ]; then
            mkdir -p keystore
            echo "${{ secrets.SIGNING_KEYSTORE_BASE64 }}" | base64 -d > keystore/release.jks
            cat > keystore.properties <<EOF
storeFile=keystore/release.jks
storePassword=${{ secrets.SIGNING_PASSWORD }}
keyAlias=hardvocabguard
keyPassword=${{ secrets.SIGNING_PASSWORD }}
EOF
          else
            echo "Signing secrets missing, build will use unsigned release config."
          fi

      - name: Assemble
        run: ./gradlew :app:assembleDebug :app:assembleRelease -x lint

      - name: Upload APKs
        uses: actions/upload-artifact@v4
        with:
          name: apks
          path: |
            app/build/outputs/apk/debug/*.apk
            app/build/outputs/apk/release/*.apk

